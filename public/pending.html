<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In attesa — Sitora AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 24px; }
    .logo { font-size: 13px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
    a { color: #888; font-size: 13px; text-decoration: none; }
    a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Sitora AI</div>
    <div class="icon">⏳</div>
    <h1>Accesso in attesa</h1>
    <p>Il tuo account è stato registrato. L'amministratore deve approvare il tuo accesso prima che tu possa utilizzare l'app.</p>
    <a href="/auth/logout">← Esci</a>
  </div>
</body>
</html>
