<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diffusion Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #272727;
      --border2:   #333;
      --text:      #e8e8e8;
      --text2:     #888;
      --text3:     #555;
      --accent:    #e8c547;
      --accent-dim:#b89d33;
      --success:   #4caf6e;
      --error:     #cf4a4a;
      --warning:   #d4882a;
      --sidebar-w: 220px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    body { display: flex; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .logo {
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 14px; height: 14px; }

    .logo-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .nav {
      flex: 1;
      padding: 12px 8px;
      overflow-y: auto;
    }

    .nav-group-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .nav-item:hover, a.nav-item:hover { background: var(--surface2); color: var(--text); }
    a.nav-item { text-decoration: none; }

    .nav-item.active {
      background: rgba(232, 197, 71, 0.1);
      color: var(--accent);
    }

    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }

    .nav-sep { height: 1px; background: var(--border); margin: 10px 8px; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      background: var(--surface2);
    }

    .user-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-label { font-size: 12.5px; color: var(--text2); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .topbar-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .icon-btn svg { width: 15px; height: 15px; }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Model row ── */
    .model-row-label {
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .model-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .model-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .model-chip:hover { border-color: var(--border2); background: var(--surface2); }

    .model-chip.active {
      border-color: var(--accent);
      background: rgba(232, 197, 71, 0.06);
    }

    .model-chip-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .model-chip-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .model-chip.active .model-chip-badge { color: var(--accent-dim); }

    /* ── Workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr; }
    }

    /* ── Canvas ── */
    .canvas-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 480px;
    }

    .canvas-topbar {
      height: 44px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .canvas-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .canvas-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: repeating-conic-gradient(#181818 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
    }

    .canvas-empty {
      text-align: center;
      color: var(--text3);
    }

    .canvas-empty-icon {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    .canvas-empty-text {
      font-size: 13px;
    }

    .canvas-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    .generating-overlay {
      position: absolute;
      inset: 0;
      background: rgba(14, 14, 14, 0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .gen-label {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text2);
    }

    .gen-status {
      font-size: 12px;
      color: var(--text3);
    }

    /* ── Prompt panel ── */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .block-title {
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .field-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }

    .field-input:hover { border-color: var(--border2); }
    .field-input:focus { border-color: var(--accent-dim); }
    textarea.field-input { min-height: 88px; line-height: 1.5; }
    textarea.field-input.sm { min-height: 54px; }

    .params-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .param-field { display: flex; flex-direction: column; gap: 4px; }

    .param-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    .param-input:hover { border-color: var(--border2); }
    .param-input:focus { border-color: var(--accent-dim); }

    .field-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .field-label-row .field-label { margin-bottom: 0; }

    .link-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 11.5px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
      transition: color 0.15s;
    }

    .link-btn:hover { color: var(--accent); }
    .link-btn.active { color: var(--accent); }

    .ratio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .ratio-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 7px 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.2;
    }

    .ratio-btn span {
      font-size: 9.5px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
    }

    .ratio-btn:hover { border-color: var(--border2); color: var(--text); }
    .ratio-btn.active { border-color: var(--accent-dim); color: var(--accent); background: rgba(232,197,71,0.06); }
    .ratio-btn.active span { color: var(--accent-dim); }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    .btn-generate:hover { background: #f0d060; }
    .btn-generate:active { transform: scale(0.99); }
    .btn-generate:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

    /* ── Gallery ── */
    .gallery-section {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .gallery-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .gallery-item:hover { border-color: var(--border2); }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .gallery-item:hover img { transform: scale(1.03); }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-meta {
      font-size: 11.5px;
      color: #ccc;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .gallery-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .gallery-actions { opacity: 1; }

    .gallery-btn {
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      backdrop-filter: blur(6px);
    }

    .gallery-btn:hover { background: rgba(255,255,255,0.15); }
    .gallery-btn.delete:hover { background: var(--error); border-color: var(--error); }

    .gallery-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text3);
      font-size: 13px;
    }

    .gallery-empty-icon { font-size: 24px; margin-bottom: 10px; opacity: 0.3; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 8, 0.94);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 40px;
    }

    .lightbox.open { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lightbox-close:hover { color: var(--text); border-color: var(--border2); }

    .lightbox-img {
      max-width: 90vw;
      max-height: 78vh;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .lightbox-meta { text-align: center; max-width: 560px; }

    .lightbox-prompt {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .lightbox-params {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      color: var(--text3);
    }

    .lightbox-actions { display: flex; gap: 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 11px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      backdrop-filter: blur(10px);
      font-size: 13px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--error); }
    .toast.warning { border-left: 3px solid var(--warning); }

    .toast-icon { font-size: 14px; }
    .toast-message { color: var(--text); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" fill="#000"/>
          <rect x="8" y="1" width="5" height="5" fill="#000"/>
          <rect x="1" y="8" width="5" height="5" fill="#000"/>
          <rect x="8" y="8" width="5" height="5" fill="#000" opacity="0.4"/>
        </svg>
      </div>
      <span class="logo-name">Diffusion Studio</span>
    </div>

    <nav class="nav">
      <div class="nav-group-label">Workspace</div>
      <div class="nav-item active" data-tab="generate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        Generate
      </div>
      <a class="nav-item" href="/video.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Video
      </a>
      <a class="nav-item" href="/gallery.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        Gallery
      </a>

      <div class="nav-sep"></div>
      <div class="nav-group-label">Config</div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Preferences
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        API Keys
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-dot"></div>
        <span class="user-label">Connected · RunPod</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Generate</span>
      <div class="topbar-actions">
        <button class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="content">

      <!-- Model selector (hidden when single model) -->
      <div id="modelSelectorRow" style="display:none">
        <div class="model-row-label">Model</div>
        <div class="model-list" id="modelGrid"></div>
      </div>

      <!-- Workspace -->
      <div class="workspace">

        <!-- Canvas -->
        <div class="canvas-wrap">
          <div class="canvas-topbar">
            <span class="canvas-label">Canvas</span>
            <button class="btn-secondary" onclick="downloadCurrent()" id="downloadBtn" style="display:none; font-size:12px; padding:5px 12px;">
              ↓ Download
            </button>
          </div>
          <div class="canvas-body" id="canvasViewport">
            <div class="canvas-empty canvas-placeholder">
              <div class="canvas-empty-icon">◻</div>
              <div class="canvas-empty-text">Your image will appear here</div>
            </div>
            <img class="canvas-image" id="resultImg" />
            <div class="generating-overlay" id="generatingOverlay">
              <div class="spinner"></div>
              <div class="gen-label">Generating</div>
              <div class="gen-status" id="generatingStatus">Initializing...</div>
            </div>
          </div>
        </div>

        <!-- Prompt panel -->
        <div class="panel">
          <div class="panel-block">
            <div class="block-title">Prompt</div>
            <div class="field">
              <label class="field-label">Positive</label>
              <textarea class="field-input" id="positivePrompt" placeholder="A serene mountain landscape at golden hour, cinematic..."></textarea>
            </div>
            <div class="field">
              <label class="field-label">Negative</label>
              <textarea class="field-input sm" id="negativePrompt">worst quality, low quality, normal quality, lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, jpeg artifacts, signature, watermark, username, blurry</textarea>
            </div>
          </div>

          <div class="panel-block">
            <div class="block-title">Parameters</div>

            <!-- Size -->
            <div class="field">
              <div class="field-label-row">
                <label class="field-label">Size</label>
                <button class="link-btn" id="customToggle" onclick="toggleCustomSize()">Custom</button>
              </div>
              <div class="ratio-grid" id="ratioGrid">
                <button class="ratio-btn active" onclick="setRatio(512,512,this)">1:1<span>512</span></button>
                <button class="ratio-btn" onclick="setRatio(768,512,this)">3:2<span>768×512</span></button>
                <button class="ratio-btn" onclick="setRatio(512,768,this)">2:3<span>512×768</span></button>
                <button class="ratio-btn" onclick="setRatio(768,432,this)">16:9<span>768×432</span></button>
                <button class="ratio-btn" onclick="setRatio(432,768,this)">9:16<span>432×768</span></button>
                <button class="ratio-btn" onclick="setRatio(640,640,this)">1:1<span>640</span></button>
              </div>
              <div class="custom-size" id="customSize" style="display:none">
                <div class="params-grid" style="margin-top:8px">
                  <div class="param-field">
                    <label class="field-label">Width</label>
                    <input type="number" class="param-input" id="width" value="512" min="256" max="2048" step="64">
                  </div>
                  <div class="param-field">
                    <label class="field-label">Height</label>
                    <input type="number" class="param-input" id="height" value="512" min="256" max="2048" step="64">
                  </div>
                </div>
              </div>
            </div>

            <div class="params-grid">
              <div class="param-field">
                <label class="field-label">Steps</label>
                <input type="number" class="param-input" id="steps" value="20" min="1" max="150">
              </div>
              <div class="param-field">
                <label class="field-label">CFG</label>
                <input type="number" class="param-input" id="cfg" value="7" min="1" max="30" step="0.5">
              </div>
              <div class="param-field">
                <label class="field-label">Seed</label>
                <input type="number" class="param-input" id="seed" value="-1">
              </div>
              <div class="param-field">
                <label class="field-label">Checkpoint</label>
                <input type="text" class="param-input" id="checkpoint" value="v1-5-pruned-emaonly.ckpt">
              </div>
            </div>
          </div>

          <button class="btn-generate" id="generateBtn" onclick="generate()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Generate
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span class="toast-message" id="toastMessage">Done</span>
  </div>

  <script>
    const models = [
      {
        id: 'sd-v1-5',
        name: 'Stable Diffusion 1.5',
        description: 'Versatile general purpose model',
        icon: '🎨',
        badge: 'Default',
        checkpoint: 'v1-5-pruned-emaonly.ckpt'
      }
    ];

    let selectedModel = models[0];
    let currentImageFilename = null;
    let customSizeActive = false;

    window.onload = () => {
      renderModels();
    };

    function setRatio(w, h, btn) {
      document.getElementById('width').value = w;
      document.getElementById('height').value = h;
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleCustomSize() {
      customSizeActive = !customSizeActive;
      const panel = document.getElementById('customSize');
      const grid = document.getElementById('ratioGrid');
      const btn = document.getElementById('customToggle');
      panel.style.display = customSizeActive ? 'block' : 'none';
      grid.style.display = customSizeActive ? 'none' : 'grid';
      btn.classList.toggle('active', customSizeActive);
      btn.textContent = customSizeActive ? 'Presets' : 'Custom';
    }

    function renderModels() {
      const grid = document.getElementById('modelGrid');
      const row = document.getElementById('modelSelectorRow');
      if (models.length > 1) {
        row.style.display = '';
        grid.innerHTML = models.map(model => `
          <div class="model-chip ${model.id === selectedModel.id ? 'active' : ''}"
               onclick="selectModel('${model.id}')">
            <span class="model-chip-name">${model.name}</span>
            <span class="model-chip-badge">${model.badge}</span>
          </div>
        `).join('');
      } else {
        row.style.display = 'none';
      }
    }

    function selectModel(modelId) {
      selectedModel = models.find(m => m.id === modelId);
      document.getElementById('checkpoint').value = selectedModel.checkpoint;
      renderModels();
      showToast('Model: ' + selectedModel.name, 'success');
    }

    async function generate() {
      const btn = document.getElementById('generateBtn');
      const overlay = document.getElementById('generatingOverlay');
      const status = document.getElementById('generatingStatus');
      const viewport = document.getElementById('canvasViewport');

      btn.disabled = true;
      overlay.style.display = 'flex';
      viewport.classList.add('has-image');

      const body = {
        positivePrompt: document.getElementById('positivePrompt').value,
        negativePrompt: document.getElementById('negativePrompt').value,
        width: parseInt(document.getElementById('width').value),
        height: parseInt(document.getElementById('height').value),
        steps: parseInt(document.getElementById('steps').value),
        cfg: parseFloat(document.getElementById('cfg').value),
        seed: parseInt(document.getElementById('seed').value),
        checkpoint: document.getElementById('checkpoint').value,
      };

      try {
        status.textContent = 'Sending to RunPod...';

        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        status.textContent = 'Processing...';
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        document.getElementById('resultImg').src = data.url;
        document.getElementById('resultImg').style.display = 'block';
        document.querySelector('.canvas-placeholder').style.display = 'none';
        document.getElementById('downloadBtn').style.display = 'block';
        currentImageFilename = data.filename;

        showToast('Image generated', 'success');

      } catch (err) {
        showToast(err.message, 'error');
        viewport.classList.remove('has-image');
      } finally {
        btn.disabled = false;
        overlay.style.display = 'none';
      }
    }

    function downloadCurrent() {
      if (currentImageFilename) {
        const a = document.createElement('a');
        a.href = `/outputs/${currentImageFilename}`;
        a.download = currentImageFilename;
        a.click();
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const icons = { success: '✓', error: '✕', warning: '⚠' };
      document.getElementById('toastIcon').textContent = icons[type] || 'ℹ';
      document.getElementById('toastMessage').textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

  </script>
</body>
</html>
