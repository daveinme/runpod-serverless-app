<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Diffusion Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #272727;
      --border2:   #333;
      --text:      #e8e8e8;
      --text2:     #888;
      --text3:     #555;
      --accent:    #e8c547;
      --accent-dim:#b89d33;
      --success:   #4caf6e;
      --error:     #cf4a4a;
      --warning:   #d4882a;
      --sidebar-w: 220px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    body { display: flex; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .logo {
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 14px; height: 14px; }

    .logo-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .nav {
      flex: 1;
      padding: 12px 8px;
      overflow-y: auto;
    }

    .nav-group-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 12px 8px;
    }

    .nav-item, a.nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      text-decoration: none;
    }

    .nav-item:hover, a.nav-item:hover { background: var(--surface2); color: var(--text); }

    .nav-item.active, a.nav-item.active {
      background: rgba(232, 197, 71, 0.1);
      color: var(--accent);
    }

    .nav-item svg, a.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg, a.nav-item.active svg { opacity: 1; }

    .nav-sep { height: 1px; background: var(--border); margin: 10px 8px; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-dot {
      width: 7px;
      height: 7px;
      background: var(--success);
      border-radius: 50%;
    }

    .user-label {
      font-size: 12px;
      color: var(--text3);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
    .icon-btn svg { width: 14px; height: 14px; }

    .icon-btn.danger:hover { background: var(--error); border-color: var(--error); color: #fff; }

    .count-badge {
      font-size: 12px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    /* ── Gallery Content ── */
    .gallery-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab { padding: 4px 12px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
    .filter-tab:hover { border-color: var(--border2); color: var(--text2); }
    .filter-tab.active { border-color: var(--accent-dim); color: var(--accent); background: rgba(232,197,71,0.07); }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .gallery-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .gallery-item:hover { border-color: var(--border2); }

    .gallery-item img, .gallery-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .gallery-item:hover img { transform: scale(1.03); }

    /* Video badge */
    .video-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      backdrop-filter: blur(6px);
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-meta {
      font-size: 11.5px;
      color: #ccc;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .gallery-meta-params {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      margin-top: 4px;
    }

    .gallery-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .gallery-actions { opacity: 1; }

    .gallery-btn {
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      backdrop-filter: blur(6px);
    }

    .gallery-btn:hover { background: rgba(255,255,255,0.15); }
    .gallery-btn.delete:hover { background: var(--error); border-color: var(--error); }
    .gallery-btn.make-video { color: var(--accent); font-size: 11px; }
    .gallery-btn.make-video:hover { background: rgba(232,197,71,0.2); border-color: var(--accent-dim); }

    .gallery-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
      font-size: 13px;
    }

    .gallery-empty-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.25; }

    .gallery-empty a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .gallery-empty a:hover { text-decoration: underline; }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 8, 0.94);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      padding: 40px;
    }

    .lightbox.open { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lightbox-close:hover { color: var(--text); border-color: var(--border2); }

    .lightbox-img {
      max-width: 90vw;
      max-height: 75vh;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .lightbox-meta { text-align: center; max-width: 560px; }

    .lightbox-prompt {
      font-size: 13.5px;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .lightbox-params {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      color: var(--text3);
    }

    .lightbox-actions { display: flex; gap: 10px; }

    .btn-primary {
      height: 36px;
      padding: 0 20px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:hover { background: var(--accent-dim); }

    .btn-secondary {
      height: 36px;
      padding: 0 16px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 11px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      backdrop-filter: blur(10px);
      font-size: 13px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--error); }
    .toast.warning { border-left: 3px solid var(--warning); }

    .toast-icon { font-size: 14px; }
    .toast-message { color: var(--text); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" fill="#000"/>
          <rect x="8" y="1" width="5" height="5" fill="#000"/>
          <rect x="1" y="8" width="5" height="5" fill="#000"/>
          <rect x="8" y="8" width="5" height="5" fill="#000" opacity="0.4"/>
        </svg>
      </div>
      <span class="logo-name">Diffusion Studio</span>
    </div>

    <nav class="nav">
      <div class="nav-group-label">Workspace</div>
      <a class="nav-item" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        Generate
      </a>
      <a class="nav-item" href="/video.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Video
      </a>
      <a class="nav-item active" href="/gallery.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        Gallery
      </a>

      <div class="nav-sep"></div>
      <div class="nav-group-label">Config</div>

      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Preferences
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        API Keys
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-dot"></div>
        <span class="user-label">Connected · RunPod</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:16px">
        <span class="topbar-title">Gallery <span class="count-badge" id="countBadge"></span></span>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('image', this)">Images</button>
          <button class="filter-tab" onclick="setFilter('video', this)">Video</button>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="loadGallery()" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
        <button class="icon-btn danger" onclick="clearGallery()" title="Delete all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="gallery-content">
      <div id="galleryContainer">
        <div class="gallery-empty">
          <div class="gallery-empty-icon">▣</div>
          <div>Loading...</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="" style="display:none" />
    <video class="lightbox-img" id="lightboxVideo" controls loop playsinline style="display:none"></video>
    <div class="lightbox-meta">
      <div class="lightbox-prompt" id="lightboxPrompt"></div>
      <div class="lightbox-params" id="lightboxParams"></div>
    </div>
    <div class="lightbox-actions">
      <a class="btn-primary" id="lightboxDownload" href="#" download="output">
        ↓ Download
      </a>
      <button class="btn-secondary" id="lightboxMakeVideo" onclick="sendToVideo()" style="display:none">→ Video</button>
      <button class="btn-secondary" onclick="deleteLightboxItem()">Delete</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span class="toast-message" id="toastMessage">Done</span>
  </div>

  <script>
    let galleryData = [];
    let currentLightboxItem = null;
    let activeFilter = 'all';

    window.onload = () => loadGallery();

    async function loadGallery() {
      try {
        const res = await fetch('/api/gallery');
        galleryData = await res.json();
        renderGallery(galleryData);
      } catch (err) {
        console.error('Gallery load failed:', err);
      }
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(galleryData);
    }

    function renderGallery(history) {
      const container = document.getElementById('galleryContainer');
      const badge = document.getElementById('countBadge');

      const filtered = activeFilter === 'all' ? history
        : activeFilter === 'video' ? history.filter(i => i.type === 'video')
        : history.filter(i => i.type !== 'video');

      if (filtered.length === 0) {
        badge.textContent = '';
        container.innerHTML = `
          <div class="gallery-empty">
            <div class="gallery-empty-icon">▣</div>
            <div>Nessuna generazione. <a href="/">Genera →</a></div>
          </div>`;
        return;
      }

      badge.textContent = `· ${filtered.length}`;

      container.innerHTML = `<div class="gallery-grid">${filtered.map(item => {
        const isVideo = item.type === 'video';
        const date = new Date(item.ts).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        const promptText = (item.prompt || item.positivePrompt || '—').substring(0, 90);
        const params = isVideo
          ? `${item.width}×${item.height} · ${item.duration}s · ${date}`
          : `${item.width}×${item.height} · ${item.steps} steps · ${date}`;

        const media = isVideo
          ? `<video src="${item.url}" muted loop preload="metadata" style="pointer-events:none"></video>`
          : `<img src="${item.url}" loading="lazy" />`;

        const makeVideoBtn = !isVideo
          ? `<button class="gallery-btn make-video" onclick="sendToVideo('${item.url}')" title="Crea video">▶</button>`
          : '';

        return `
          <div class="gallery-item" onclick="openLightbox('${item.filename}')">
            ${media}
            ${isVideo ? '<div class="video-badge">MP4</div>' : ''}
            <div class="gallery-overlay">
              <div class="gallery-meta">${promptText}</div>
              <div class="gallery-meta-params">${params}</div>
            </div>
            <div class="gallery-actions" onclick="event.stopPropagation()">
              ${makeVideoBtn}
              <a class="gallery-btn" href="${item.url}" download="${item.filename}" title="Download">↓</a>
              <button class="gallery-btn delete" onclick="deleteItem('${item.filename}')" title="Delete">✕</button>
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    function openLightbox(filename) {
      const item = galleryData.find(i => i.filename === filename);
      if (!item) return;
      currentLightboxItem = item;
      const isVideo = item.type === 'video';

      const img = document.getElementById('lightboxImg');
      const vid = document.getElementById('lightboxVideo');

      if (isVideo) {
        vid.src = item.url;
        vid.style.display = 'block';
        img.style.display = 'none';
        vid.play();
      } else {
        img.src = item.url;
        img.style.display = 'block';
        vid.style.display = 'none';
        vid.pause();
      }

      document.getElementById('lightboxDownload').href = item.url;
      document.getElementById('lightboxDownload').download = item.filename;
      document.getElementById('lightboxPrompt').textContent = item.prompt || item.positivePrompt || '—';
      document.getElementById('lightboxParams').textContent = isVideo
        ? `${item.width}×${item.height}  ·  ${item.duration}s  ·  ${item.framerate}fps  ·  seed ${item.seed}`
        : `${item.width}×${item.height}  ·  ${item.steps} steps  ·  CFG ${item.cfg}  ·  seed ${item.seed}`;

      // Show "→ Video" button only for images
      document.getElementById('lightboxMakeVideo').style.display = isVideo ? 'none' : 'inline-flex';

      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox(e) {
      if (!e || e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightboxVideo').pause();
      }
    }

    function deleteLightboxItem() {
      if (currentLightboxItem) { closeLightbox(); deleteItem(currentLightboxItem.filename); }
    }

    function sendToVideo(imageUrl) {
      const url = imageUrl || (currentLightboxItem ? currentLightboxItem.url : null);
      if (!url) return;
      closeLightbox();
      window.location.href = `/video.html?imageUrl=${encodeURIComponent(url)}`;
    }

    async function deleteItem(filename) {
      if (!confirm('Eliminare questo file?')) return;
      try {
        await fetch(`/api/gallery/${filename}`, { method: 'DELETE' });
        showToast('Eliminato', 'success');
        loadGallery();
      } catch (err) {
        showToast('Errore eliminazione', 'error');
      }
    }

    async function clearGallery() {
      if (!confirm('Eliminare tutto? Operazione irreversibile.')) return;
      try {
        await Promise.all(galleryData.map(i =>
          fetch(`/api/gallery/${i.filename}`, { method: 'DELETE' })
        ));
        showToast('Gallery svuotata', 'success');
        loadGallery();
      } catch (err) {
        showToast('Errore', 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const icons = { success: '✓', error: '✕', warning: '⚠' };
      document.getElementById('toastIcon').textContent = icons[type] || 'ℹ';
      document.getElementById('toastMessage').textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') navigateLightbox(1);
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
    });

    function navigateLightbox(dir) {
      if (!currentLightboxItem) return;
      const filtered = activeFilter === 'all' ? galleryData
        : activeFilter === 'video' ? galleryData.filter(i => i.type === 'video')
        : galleryData.filter(i => i.type !== 'video');
      const idx = filtered.findIndex(i => i.filename === currentLightboxItem.filename);
      const next = filtered[idx + dir];
      if (next) openLightbox(next.filename);
    }
  </script>
</body>
</html>
